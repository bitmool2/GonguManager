version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: gongu_manager_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: gongu_manager
    ports:
      - "3308:3306"
    volumes:
      - gongu_mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    restart: unless-stopped

volumes:
  gongu_mysql_data:
